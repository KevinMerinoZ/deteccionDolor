<div class="modal fade" id="confirmarCerrarSesion{{actividadUsuario.usuario.idUsuarios}}" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Confirmar cerrar la sesion</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        ¿Estás seguro de que quieres cerrar la sesion de este usuario?
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>

        <a href="{% url 'sesionActiva:cerrarSesionActiva' actividadUsuario.usuario.idUsuarios %}" class="btn btn-danger">
          Sí, cerrar sesion
        </a>
      </div>

    </div>
  </div>
</div>
