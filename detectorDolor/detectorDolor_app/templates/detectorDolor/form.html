<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label">Nombre del experimento</label>
        <input type="text" name="nombreSesion" value="{{ form.nombreSesion.value|default_if_none:'' }}" class="form-control">
    </div>

    {% if user.groups.first.name == 'administrador' %}
        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <select name="usuario" class="form-select">
                {% for usuario in usuarios %}
                    <option value="{{ usuario.id }}" {% if form.usuario.value == usuario.id %}selected{% endif %}>
                        {{ usuario.user.username }}
                    </option>
                {% endfor %}
            </select>
        </div>
    {% endif %}

    <div class="mb-3">
        <label class="form-label">Número de mediciones 1</label>
        <input type="number" name="noMediciones1" value="{{ form.noMediciones1.value|default_if_none:'' }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Intervalo de tiempo 1</label>
        <input type="number" name="intervaloTemp1" value="{{ form.intervaloTemp1.value|default_if_none:'' }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Número de mediciones 2 (opcional)</label>
        <input type="number" name="noMediciones2" value="{{ form.noMediciones2.value|default_if_none:'' }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Intervalo de tiempo 2 (opcional)</label>
        <input type="number" name="intervaloTemp2" value="{{ form.intervaloTemp2.value|default_if_none:'' }}" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Observaciones</label>
        <input type="text" name="observaciones" value="{{ form.observaciones.value|default_if_none:'' }}" class="form-control">
    </div>

    <div class="div-footer">
        <button type="submit" class="btnPrimario">Siguiente</button>
        <a class="btnSecundario"
           href="">
            Cancelar
        </a>
    </div>
</form>
